name: Release

on:
  push:
    tags:
      - '*.*.*'  # Triggers on tags like v1.0.0, v0.1.2, etc.

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
            
          # macOS x86-64
          - os: macos-26-intel
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
            
          # macOS ARM64
          - os: macos-26
            target: aarch64-apple-darwin
            artifact_name: macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libcurl4-openssl-dev

      - name: Install htslib (Ubuntu x86-64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y libhts-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install htslib pkg-config

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          # Adjust the binary name to match your project
          cp target/${{ matrix.target }}/release/pileuphi artifacts/
          cd artifacts
          tar -czf ../pileup-hi-${{ matrix.artifact_name }}.tar.gz *

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./pileup-hi-${{ matrix.artifact_name }}.tar.gz
          asset_name: pileup-hi-${{ github.ref_name }}-${{ matrix.artifact_name }}.tar.gz
          asset_content_type: application/gzip

  publish:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libhts-dev

      - name: publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN_PILEUPHI }}
